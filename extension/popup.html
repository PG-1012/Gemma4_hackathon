<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  body { font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         width: 280px; padding: 14px; margin: 0; color: #1f2937; }
  h1 { font-size: 14px; margin: 0 0 10px; }
  label { display: block; font-weight: 600; margin: 10px 0 4px; }
  input { width: 100%; padding: 7px 8px; box-sizing: border-box;
          border: 1px solid #d1d5db; border-radius: 6px; font: inherit; }
  button { margin-top: 12px; width: 100%; padding: 9px; border: none;
           border-radius: 6px; font-weight: 600; cursor: pointer; }
  button:disabled { opacity: 0.5; cursor: default; }
  #start { background: #2563eb; color: #fff; }
  #stop { background: #dc2626; color: #fff; }
  #status { margin-top: 12px; color: #374151; white-space: pre-wrap;
            font-size: 12px; line-height: 1.4; }
  .rec { color: #dc2626; font-weight: 700; }
</style>
</head>
<body>
  <h1>Speedrunner Recorder</h1>
  <label for="name">Workflow name</label>
  <input id="name" placeholder="Acme Expense Report" />
  <label for="backend">Backend URL</label>
  <input id="backend" value="http://localhost:8000" />
  <button id="start">● Start recording</button>
  <button id="stop">■ Stop &amp; save</button>
  <div id="status">Idle.</div>
  <script src="popup.js"></script>
</body>
</html>
